<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moodle Extractor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #0f0f1a;
      color: #d4d4d8;
    }

    h1 { font-size: 15px; text-align: center; margin-bottom: 14px; color: #e94560; }

    /* --- Config section --- */
    .section { margin-bottom: 14px; }
    .section-label { font-size: 11px; color: #71717a; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    .input-row { display: flex; gap: 6px; }
    .input-row input {
      flex: 1;
      padding: 7px 10px;
      border: 1px solid #27272a;
      border-radius: 6px;
      background: #18181b;
      color: #d4d4d8;
      font-size: 12px;
      outline: none;
    }
    .input-row input:focus { border-color: #4ecca3; }
    .input-row button {
      padding: 7px 12px;
      border: none;
      border-radius: 6px;
      background: #4ecca3;
      color: #0f0f1a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    /* --- Status bar --- */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      border-radius: 6px;
      background: #18181b;
      margin-bottom: 10px;
      font-size: 12px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block; margin-right: 6px;
    }
    .status-dot.idle { background: #71717a; }
    .status-dot.capturing { background: #4ecca3; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* --- Buttons --- */
    .btn {
      display: block; width: 100%; padding: 9px; margin-bottom: 6px;
      border: none; border-radius: 6px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-capture { background: #4ecca3; color: #0f0f1a; }
    .btn-capture.active { background: #e94560; color: #fff; }
    .btn-secondary { background: #27272a; color: #d4d4d8; }

    /* --- Course list --- */
    .course-list { max-height: 220px; overflow-y: auto; margin-bottom: 10px; }
    .course-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px; margin-bottom: 4px;
      border-radius: 6px; background: #18181b;
      font-size: 12px;
    }
    .course-name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-right: 8px; }
    .course-badge { background: #27272a; padding: 2px 7px; border-radius: 10px; font-size: 10px; color: #a1a1aa; margin-right: 6px; }
    .course-actions { display: flex; gap: 4px; }
    .course-actions button {
      padding: 3px 8px; border: none; border-radius: 4px;
      font-size: 10px; font-weight: 600; cursor: pointer;
    }
    .btn-export-course { background: #4ecca3; color: #0f0f1a; }
    .btn-clear-course { background: #3f3f46; color: #a1a1aa; }

    .empty-state {
      text-align: center; padding: 16px; color: #52525b; font-size: 11px;
    }

    /* --- Footer --- */
    .footer { display: flex; gap: 6px; }
    .footer .btn { flex: 1; }

    /* --- Inline validation message --- */
    .validation-msg {
      font-size: 11px; margin-top: 4px; min-height: 14px;
      transition: opacity 0.2s;
    }
    .validation-msg.error { color: #e94560; }
    .validation-msg.success { color: #4ecca3; }

    /* --- Hint text --- */
    .hint-text {
      font-size: 10px; color: #52525b; text-align: center;
      margin-bottom: 6px;
    }

    /* --- Toast notifications --- */
    .toast-container {
      position: fixed; top: 8px; left: 16px; right: 16px;
      z-index: 1000; display: flex; flex-direction: column; gap: 4px;
    }
    .toast {
      padding: 8px 12px; border-radius: 6px;
      font-size: 11px; font-weight: 500;
      animation: toast-in 0.25s ease-out;
      display: flex; align-items: center; gap: 6px;
    }
    .toast.success { background: #065f46; color: #a7f3d0; }
    .toast.error { background: #7f1d1d; color: #fecaca; }
    .toast.info { background: #1e3a5f; color: #bfdbfe; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toast-out { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }

    /* --- Confirmation dialog --- */
    .confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 2000;
      align-items: center; justify-content: center;
    }
    .confirm-overlay.active { display: flex; }
    .confirm-box {
      background: #18181b; border: 1px solid #27272a;
      border-radius: 8px; padding: 16px; width: 280px;
      text-align: center;
    }
    .confirm-box p { font-size: 12px; margin-bottom: 12px; color: #d4d4d8; }
    .confirm-box .confirm-actions { display: flex; gap: 8px; justify-content: center; }
    .confirm-box .confirm-actions button {
      padding: 7px 16px; border: none; border-radius: 6px;
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .confirm-box .btn-confirm-yes { background: #e94560; color: #fff; }
    .confirm-box .btn-confirm-no { background: #3f3f46; color: #a1a1aa; }

    /* --- Storage warning --- */
    .storage-warning {
      display: none; padding: 6px 10px; border-radius: 6px;
      background: #78350f; color: #fde68a;
      font-size: 10px; text-align: center; margin-bottom: 10px;
    }
    .storage-warning.visible { display: block; }
  </style>
</head>
<body>
  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Confirmation dialog -->
  <div id="confirm-overlay" class="confirm-overlay">
    <div class="confirm-box">
      <p id="confirm-msg">Are you sure?</p>
      <div class="confirm-actions">
        <button id="btn-confirm-yes" class="btn-confirm-yes">Yes, delete</button>
        <button id="btn-confirm-no" class="btn-confirm-no">Cancel</button>
      </div>
    </div>
  </div>

  <h1>Moodle Extractor</h1>

  <!-- Storage warning -->
  <div id="storage-warning" class="storage-warning"></div>

  <!-- Moodle URL config -->
  <div class="section">
    <div class="section-label">Moodle URL</div>
    <div class="input-row">
      <input id="moodle-url" type="url" placeholder="https://www.moodle.udesc.br">
      <button id="btn-save-url">Save</button>
    </div>
    <div id="url-validation" class="validation-msg"></div>
  </div>

  <!-- Status + capture toggle -->
  <div class="status-bar">
    <div><span id="status-dot" class="status-dot idle"></span><span id="status-text">Idle</span></div>
    <span id="status-info" style="color:#71717a; font-size:11px;"></span>
  </div>
  <div id="capture-hint" class="hint-text"></div>
  <button id="btn-capture" class="btn btn-capture" disabled>Start Capture</button>

  <!-- Captured courses -->
  <div class="section">
    <div class="section-label">Captured Courses</div>
    <div id="course-list" class="course-list">
      <div class="empty-state">No courses captured yet.</div>
    </div>
  </div>

  <!-- Footer actions -->
  <div class="footer">
    <button id="btn-export-all" class="btn btn-secondary" disabled>Export All</button>
    <button id="btn-clear-all" class="btn btn-secondary" disabled>Clear All</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
