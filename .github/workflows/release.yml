name: Release

on:
  push:
    tags:
      - 'v*.*.*'       # triggered by tags like v1.0.0, v2.1.3, etc.
  workflow_dispatch:   # manual trigger from the GitHub Actions UI
    inputs:
      version:
        description: 'Version to release (e.g. 1.2.3) — leave empty to use manifest.json'
        required: false
        default: ''

permissions:
  contents: write      # needed to create GitHub Releases

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Resolve version ─────────────────────────────────────────────────────
      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python3 -c "import json; print(json.load(open('manifest.json'))['version'])")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      # ── Update manifest version (if overriding) ──────────────────────────────
      - name: Sync manifest version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          python3 - <<'EOF'
          import json, os
          v = os.environ["VERSION"]
          with open("manifest.json") as f:
              m = json.load(f)
          m["version"] = v
          with open("manifest.json", "w") as f:
              json.dump(m, f, indent=2)
              f.write("\n")
          print(f"manifest.json version set to {v}")
          EOF
        env:
          VERSION: ${{ steps.version.outputs.version }}

      # ── Package extension ────────────────────────────────────────────────────
      - name: Package extension
        run: |
          chmod +x scripts/build.sh
          VERSION="${{ steps.version.outputs.version }}" ./scripts/build.sh
          ls -lh dist/

      # ── Upload build artifact ─────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: moodle-extractor-${{ steps.version.outputs.version }}
          path: dist/moodle-extractor-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      # ── Create GitHub Release ─────────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Moodle Extractor v${{ steps.version.outputs.version }}
          body: |
            ## 🎉 Moodle Extractor v${{ steps.version.outputs.version }}

            ### Installation
            1. Download **moodle-extractor-${{ steps.version.outputs.version }}.zip** below and extract it.
            2. Open `chrome://extensions` in Chrome / Edge / Brave.
            3. Enable **Developer mode** and click **Load unpacked**.
            4. Select the extracted folder. Done!

            ---
            *Full changelog: [CONTRIBUTING.md](https://github.com/${{ github.repository }}/blob/main/CONTRIBUTING.md)*
          files: dist/moodle-extractor-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
